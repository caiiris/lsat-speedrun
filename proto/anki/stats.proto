syntax = "proto3";

option java_multiple_files = true;

package anki.stats;

import "anki/generic.proto";
import "anki/cards.proto";

service StatsService {
  rpc CardStats(cards.CardId) returns (CardStatsResponse);
  rpc GetReviewLogs(cards.CardId) returns (ReviewLogs);
  rpc Graphs(GraphsRequest) returns (GraphsResponse);
  rpc GetGraphPreferences(generic.Empty) returns (GraphPreferences);
  rpc SetGraphPreferences(GraphPreferences) returns (generic.Empty);
  // Speedrun (WP-2/WP-5): per-skill mastery aggregate feeding the dashboard.
  // See docs/speedrun/spec-engine.md §5.4/§5.5.
  rpc SkillMastery(SkillMasteryRequest) returns (SkillMasteryResponse);
  // Speedrun (WP-14): three-score dashboard (Memory + Performance + Readiness).
  // See docs/speedrun/spec-measurement.md §4, §8; decisions.md D-SR9/D-SR10/D-SR18/D-SR19.
  rpc SpeedrunDashboard(SpeedrunDashboardRequest) returns (SpeedrunDashboardResponse);
}

// Implicitly includes any of the above methods that are not listed in the
// backend service.
service BackendStatsService {}

// Speedrun (WP-2/WP-5): per-skill mastery aggregate.
message SkillMasteryRequest {
  int64 deck_id = 1;
}
message SkillMastery {
  string skill = 1;
  uint32 mastered = 2;
  uint32 total = 3;
  float avg_recall = 4;
}
message SkillMasteryResponse {
  repeated SkillMastery skills = 1;
}

message ReviewLogs {
  repeated CardStatsResponse.StatsRevlogEntry entries = 1;
}

message CardStatsResponse {
  message StatsRevlogEntry {
    int64 time = 1;
    RevlogEntry.ReviewKind review_kind = 2;
    uint32 button_chosen = 3;
    // seconds
    uint32 interval = 4;
    // per mill
    uint32 ease = 5;
    float taken_secs = 6;
    optional cards.FsrsMemoryState memory_state = 7;
    // seconds
    uint32 last_interval = 8;
  }
  repeated StatsRevlogEntry revlog = 1;
  int64 card_id = 2;
  int64 note_id = 3;
  string deck = 4;
  // Unix timestamps
  int64 added = 5;
  optional int64 first_review = 6;
  optional int64 latest_review = 7;
  optional int64 due_date = 8;
  optional int32 due_position = 9;
  // days
  uint32 interval = 10;
  // per mill
  uint32 ease = 11;
  uint32 reviews = 12;
  uint32 lapses = 13;
  float average_secs = 14;
  float total_secs = 15;
  string card_type = 16;
  string notetype = 17;
  optional cards.FsrsMemoryState memory_state = 18;
  // not set if due date/state not available
  optional float fsrs_retrievability = 19;
  string custom_data = 20;
  string preset = 21;
  optional string original_deck = 22;
  optional float desired_retention = 23;
  repeated float fsrs_params = 24;
}

message GraphsRequest {
  string search = 1;
  uint32 days = 2;
}

message GraphsResponse {
  message Added {
    map<int32, uint32> added = 1;
  }
  message Intervals {
    map<uint32, uint32> intervals = 1;
  }
  message Eases {
    map<uint32, uint32> eases = 1;
    float average = 2;
  }
  message Retrievability {
    map<uint32, uint32> retrievability = 1;
    float average = 2;
    float sum_by_card = 3;
    float sum_by_note = 4;
  }
  message FutureDue {
    map<int32, uint32> future_due = 1;
    bool have_backlog = 2;
    uint32 daily_load = 3;
  }
  message Today {
    uint32 answer_count = 1;
    uint32 answer_millis = 2;
    uint32 correct_count = 3;
    uint32 mature_correct = 4;
    uint32 mature_count = 5;
    uint32 learn_count = 6;
    uint32 review_count = 7;
    uint32 relearn_count = 8;
    uint32 early_review_count = 9;
  }
  // each bucket is a 24 element vec
  message Hours {
    message Hour {
      uint32 total = 1;
      uint32 correct = 2;
    }
    repeated Hour one_month = 1;
    repeated Hour three_months = 2;
    repeated Hour one_year = 3;
    repeated Hour all_time = 4;
  }
  message ReviewCountsAndTimes {
    message Reviews {
      uint32 learn = 1;
      uint32 relearn = 2;
      uint32 young = 3;
      uint32 mature = 4;
      uint32 filtered = 5;
    }
    map<int32, Reviews> count = 1;
    map<int32, Reviews> time = 2;
  }
  // 4 element vecs for buttons 1-4
  message Buttons {
    message ButtonCounts {
      repeated uint32 learning = 1;
      repeated uint32 young = 2;
      repeated uint32 mature = 3;
    }
    ButtonCounts one_month = 1;
    ButtonCounts three_months = 2;
    ButtonCounts one_year = 3;
    ButtonCounts all_time = 4;
  }
  message CardCounts {
    message Counts {
      uint32 newCards = 1;
      uint32 learn = 2;
      uint32 relearn = 3;
      uint32 young = 4;
      uint32 mature = 5;
      uint32 suspended = 6;
      uint32 buried = 7;
    }
    // Buried/suspended cards are included in counts; suspended/buried counts
    // are 0.
    Counts including_inactive = 1;
    // Buried/suspended cards are counted separately.
    Counts excluding_inactive = 2;
  }
  message TrueRetentionStats {
    message TrueRetention {
      uint32 young_passed = 1;
      uint32 young_failed = 2;
      uint32 mature_passed = 3;
      uint32 mature_failed = 4;
    }

    TrueRetention today = 1;
    TrueRetention yesterday = 2;
    TrueRetention week = 3;
    TrueRetention month = 4;
    TrueRetention year = 5;
    TrueRetention all_time = 6;
  }

  Buttons buttons = 1;
  CardCounts card_counts = 2;
  Hours hours = 3;
  Today today = 4;
  Eases eases = 5;
  Eases difficulty = 11;
  Intervals intervals = 6;
  FutureDue future_due = 7;
  Added added = 8;
  ReviewCountsAndTimes reviews = 9;
  uint32 rollover_hour = 10;
  Retrievability retrievability = 12;
  bool fsrs = 13;
  Intervals stability = 14;
  TrueRetentionStats true_retention = 15;
}

message GraphPreferences {
  enum Weekday {
    SUNDAY = 0;
    MONDAY = 1;
    FRIDAY = 5;
    SATURDAY = 6;
  }
  Weekday calendar_first_day_of_week = 1;
  bool card_counts_separate_inactive = 2;
  bool browser_links_supported = 3;
  bool future_due_show_backlog = 4;
}

message RevlogEntry {
  enum ReviewKind {
    LEARNING = 0;
    REVIEW = 1;
    RELEARNING = 2;
    FILTERED = 3;
    MANUAL = 4;
    RESCHEDULED = 5;
  }
  int64 id = 1;
  int64 cid = 2;
  int32 usn = 3;
  uint32 button_chosen = 4;
  int32 interval = 5;
  int32 last_interval = 6;
  uint32 ease_factor = 7;
  uint32 taken_millis = 8;
  ReviewKind review_kind = 9;
}

message CardEntry {
  int64 id = 1;
  int64 note_id = 2;
  int64 deck_id = 3;
}

message DeckEntry {
  int64 id = 1;
  int64 parent_id = 2;
  int64 preset_id = 3;
}

message Dataset {
  repeated RevlogEntry revlogs = 1;
  repeated CardEntry cards = 2;
  repeated DeckEntry decks = 3;
  int64 next_day_at = 4;
}

// ─── Speedrun WP-14: three-score dashboard ────────────────────────────────────
// See docs/speedrun/spec-measurement.md §4, §8 and decisions.md D-SR9/D-SR10/D-SR18/D-SR19.
// Append-only; existing messages and RPCs above are NOT edited.

// Request: the root Speedrun deck ID (all child decks are included).
message SpeedrunDashboardRequest {
  int64 deck_id = 1;
}

// Memory score (from LSAT Meta cards via FSRS recall — spec-measurement §4.1).
message SpeedrunMemoryScore {
  // Arithmetic mean of per-card FSRS recall probabilities [0, 1].
  float mean_recall = 1;
  // 95% bootstrap CI lower bound.
  float ci_lower = 2;
  // 95% bootstrap CI upper bound.
  float ci_upper = 3;
  // Number of LSAT Meta cards in the deck hierarchy (including unreviewed).
  uint32 card_count = 4;
}

// Per-skill Performance bar (spec-measurement §4.2).
// Skills with < 5 attempts have wilson_low=0 / wilson_high=1 (insufficient data).
message SpeedrunSkillPerf {
  // Canonical identity tag (e.g. "type::flaw").
  string skill = 1;
  // Total review attempts for this skill card.
  uint32 attempts = 2;
  // Correct count (ease >= 2 in revlog).
  uint32 correct = 3;
  // Wilson score 95% CI lower bound.
  float wilson_low = 4;
  // Wilson score 95% CI upper bound.
  float wilson_high = 5;
}

// Readiness abstain payload — shown when gate refuses to emit a projection.
// No point estimate is present (D-SR10, spec-measurement §6).
message SpeedrunReadinessAbstain {
  // Human-readable reasons (e.g. "Need ≥200 total attempts (have 42)").
  repeated string reasons = 1;
  // Current LR coverage (fraction of 13-type taxonomy with ≥5 attempts).
  float coverage = 2;
  // Total attempts seen so far.
  uint32 total_attempts = 3;
  // The single best skill to practice next (may be empty if no data).
  string next_best = 4;
}

// Readiness eligible payload — a labeled "LR-only estimate" (D-SR19).
message SpeedrunReadinessEligible {
  // Projected scaled score (120–180), LR-only estimate × scale factor.
  uint32 point = 1;
  // Lower bound of the honest scaled-score band.
  uint32 band_low = 2;
  // Upper bound of the honest scaled-score band.
  uint32 band_high = 3;
  // Confidence tier: "low" / "medium" / "high".
  string confidence = 4;
  // LR coverage fraction.
  float coverage = 5;
  // Total attempts across all skills.
  uint32 total_attempts = 6;
  // Top 3 contributing skills (highest w_S * Perf(S)).
  repeated string top_skills = 7;
  // Single best next skill to practice.
  string next_best = 8;
}

// Combined dashboard response — one RPC, three score cards.
message SpeedrunDashboardResponse {
  // Memory score from LSAT Meta cards.  Not set if no Meta cards in deck.
  optional SpeedrunMemoryScore memory = 1;
  // Per-skill Performance bars (sorted by skill name).
  repeated SpeedrunSkillPerf skill_perf = 2;
  // Frequency-weighted overall Performance (0..1), from covered skills only.
  float overall_perf = 3;
  // LR coverage fraction (fraction of 13-type taxonomy with ≥5 attempts).
  float lr_coverage = 4;
  // Total review attempts across all skill cards (all skills, all decks).
  uint32 total_attempts = 5;
  // Exactly one of abstain/eligible is set (never both).
  // eligible is false when abstaining; the dashboard must NOT show a Readiness
  // number when eligible = false (D-SR10, spec-measurement §6).
  bool eligible = 6;
  SpeedrunReadinessAbstain abstain = 7;
  SpeedrunReadinessEligible readiness = 8;
}
